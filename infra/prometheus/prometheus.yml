global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'backend'
    static_configs:
      - targets: ['backend:8000']

  - job_name: 'chatbot'
    static_configs:
      - targets: ['chatbot:8001']

  - job_name: 'comparison'
    static_configs:
      - targets: ['comparison:8002']
